<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Stats Visualizer</title>
    <link rel="icon" type="image/x-icon" href="../Lab3/Statistics-Silhouette.png">

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>

    <!-- Mapbox Geocoder -->
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Link to CSS File -->
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="center-text">
        <h1>Toronto Spatial Statistic Visualizer</h1>
    </div>
    <div class="map-wrapper">
        <div id="my-map" class="map-container"></div>
        <!-- LEGEND -->
        <div id='legend' class='legend'>
            <h4>Median Household Income After-Tax/Unsuitability</h4>
            <!-- Contents of legend will now be added here -->
        </div>
        <!-- INTERACTIVITY -->
        <div class='map-data-container'>
            <label class="option-label" for="layercheck">Filter map view</label>

            <!-- NAVIGATION ELEMENTS -->
            <div class='map-search-container'>
                <label for="geocoder">Search for location</label>
                <div id="geocoder" class="geocoder"></div>
                <button type="button" class="btn btn-primary btn-sm" id="returnbutton">Return to full extent</button>
            </div>

            <!-- Checkbox to show/hide layer -->
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="layercheck" checked>
                <label class="form-check-label" for="layercheck">Show layer</label>
            </div>

            <!-- Checkbox to show/hide legend -->
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="legendcheck">
                <label class="form-check-label" for="legendcheck">Show legend</label>
            </div>

            <!-- Dropdown for selecting avariable/classification scheme -->
            <form>
                <fieldset id="boundaryfieldset">
                    <label class="option-label">Select variable/classification scheme</label>
                    <select id="layer-select" name="layer-select">
                        <option value="neighbourhoods-quantile">Median Household Income After-Tax (Quantile)</option>
                        <option value="neighbourhoods-geometric-interval">Median Household Income After-Tax (Geometric
                            Interval)</option>
                        <option value="neighbourhoods-equal-interval">Median Household Income After-Tax (Equal Interval)
                        </option>
                        <option value="unsuitable-quantile">Unsuitable Housing (Quantile)</option>
                        <option value="unsuitable-geometric-interval">Unsuitable Housing (Geometric Interval)</option>
                        <option value="unsuitable-equal-interval">Unsuitable Housing (Equal Interval)</option>
                    </select>
                </fieldset>
            </form>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Link to script  -->
    <script src="script.js"></script>
</body>

</html>
